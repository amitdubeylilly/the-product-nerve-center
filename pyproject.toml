[tool.black]
line-length = 100
target-version = ["py310"]

[tool.isort]
profile = "black"
line_length = 100

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
warn_return_any = false
no_strict_optional = false

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = [
    "--cov=tools",
    "--cov=server",
    "--cov-report=term-missing",
    "--cov-branch",
    "--cov-fail-under=100",
]
